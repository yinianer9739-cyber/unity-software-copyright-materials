# Unity 游戏软著基础信息填写模板
# 保存位置：<软著资料包目录>/软著基础信息.zh.yaml
# 截图请放到：<软著资料包目录>/截图/
# 正式材料会生成到：<软著资料包目录>/输出/
# 辅助报告会生成到：<软著资料包目录>/报告/
# 不确定的字段可以先留空；如允许标红待补充，生成材料中会写为“待补充”。

登记信息:
  软件全称: ""
  # 示例：幻境守卫者游戏软件
  # 说明：登记申请表、说明书标题、源代码节选页眉均以此为准。

  软件简称: ""
  # 示例：幻境守卫者
  # 说明：没有简称可留空。

  版本号: "V1.0"
  # 示例：V1.0
  # 说明：首次申请通常填写 V1.0。

  软件分类: "应用软件"
  # 选项参考：应用软件、嵌入式软件、中间件、系统软件、其他。
  # Unity 游戏通常可填“应用软件”。

  开发完成日期: ""
  # 示例：2026-07-01
  # 说明：格式 YYYY-MM-DD。

  开发方式: "单独开发"
  # 选项参考：单独开发、合作开发、委托开发、下达任务开发。

  软件说明: "原创"
  # 选项参考：原创、修改。

  发表状态: "未发表"
  # 选项参考：已发表、未发表。

  首次发表日期: ""
  # 示例：2026-07-01
  # 说明：发表状态为“已发表”时填写；未发表可留空。

  权利取得方式: "原始取得"
  # 选项参考：原始取得、继受取得。

  权利范围: "全部权利"
  # 选项参考：全部权利、部分权利。

  源程序总行数: ""
  # 示例：12000
  # 说明：填写登记软件全部源程序总行数，纯数字；留空时会在生成源代码节选后根据项目源码统计并写入登记申请表。

项目说明:
  游戏名称: ""
  # 示例：幻境守卫者
  # 说明：用于说明书正文自然表述，可与软件简称一致。

  游戏类型: ""
  # 示例：休闲卡牌、策略对战、角色养成、塔防、RPG。

  游戏概述: |
    请填写 200-400 字，说明游戏背景、玩法类型、玩家进入游戏后主要做什么。
  # 可留空；选择“自动识别项目内容并补充空字段”后，将根据 Unity 工程、截图和已填写信息生成。
  # 示例：本游戏是一款以幻想冒险为主题的角色养成类游戏，玩家通过登录账号进入主界面，完成角色培养、阵容配置、关卡挑战和奖励领取等操作。

  开发目的: ""
  # 建议：50 字以内，不要只写软件名称。
  # 可留空；选择“自动识别项目内容并补充空字段”后，将根据 Unity 工程和已填写信息生成。
  # 示例：为用户带来优质的游戏体验、娱乐以及放松，提供优质的在线网络游戏服务。

  用户分析: |
    请填写 100-200 字，说明目标用户、使用场景和适合的玩家类型。
  # 可留空；选择“自动识别项目内容并补充空字段”后，将根据 Unity 工程、截图和已填写信息生成。
  # 示例：本游戏面向喜欢轻度策略、角色养成和关卡挑战的移动端用户，适合碎片化时间游玩。

  核心玩法: |
    请填写 150-300 字，说明主要玩法循环。
  # 可留空；选择“自动识别项目内容并补充空字段”后，将根据 Unity 工程、截图和已填写信息生成。
  # 示例：玩家登录后进入主界面，通过角色养成、装备配置和阵容调整提升战斗能力，随后进入关卡战斗，完成胜利结算并领取奖励。

  主要功能: ""
  # 建议：500 字以上，1300 字以内，用于登记申请表“软件的主要功能”，也会辅助生成说明书前 6 章。
  # 可留空；选择“自动识别项目内容并补充空字段”后，将根据 Unity 工程、截图和已填写信息生成。
  # 建议覆盖：启动入口、主界面、角色/养成、战斗、结算、奖励、设置、退出等。

  功能特点:
    - ""
  # 建议填写 4-8 条，每条 50-100 字。
  # 可留空；选择“自动识别项目内容并补充空字段”后，将根据 Unity 工程、截图和已填写信息生成。
  # 示例：登录系统支持账号输入、服务器选择和进入游戏操作，便于玩家快速进入游戏主流程。

  技术特点: ""
  # 建议：50-100 字，按真实项目填写 C#、Lua、ToLua、ShaderLab、热更新等。
  # 可留空；选择“自动识别项目内容并补充空字段”后，将根据 Unity 工程内容生成。

  运行平台: ""
  # 选项参考：Android、iOS、Android 与 iOS、Windows、微信小游戏、抖音小游戏、其他。

  行业/领域: "游戏"
  # 示例：游戏、游戏软件、文化娱乐、移动互联网、教育娱乐。
  # 说明：用于登记申请表“行业/领域”等相关字段，按软件实际应用领域填写。

开发运行环境:
  开发硬件环境: |
    CPU:Intel(R)8Core I7-9700 3.00GHZ
    显卡：NVDIA GeForce GTX1660
    内存：16GB内存以上
    硬盘：1TB

  运行硬件环境: |
    Android或iOS智能手机、平板等移动终端
    安卓6.0 、Ios12以上机型

  开发操作系统: "Windows 10/11/macOS 操作系统。"

  软件开发环境/开发工具: "Unity 2021.3、Visual Studio、Rider"

  运行平台/操作系统: "Android、iOS移动智能终端操作系统"

  运行支撑环境/支持软件: |
    移动端图形与网络运行库
    安卓6.0+ 、Ios12+

  编程语言: "C#,ShaderLab"
  # 说明：按真实项目填写，不要默认全部写 Lua。

项目路径:
  Unity项目根目录: ""
  # 必填。
  # 示例：D:/Projects/MyUnityGame
  # 说明：填写包含 Assets、ProjectSettings、Packages 的 Unity 项目根目录。

生成设置:
  是否允许缺失字段标红待补充: true
  # true：缺失字段可在材料中写为红色“待补充”。
  # false：缺失必填字段时暂停生成，等待补齐。

  源代码节选是否显示行号: false
  # 固定要求：代码不显示行号。

  源代码节选最低行数: 3200
  # 固定要求：源代码节选不少于 3200 行。

  申请表输出格式: "docx"
  # 选项参考：doc、docx。

截图设置:
  自动截图分辨率: ""
  # 可选。示例：720x1280、1080x1920、1280x720。
  # 留空时：临时工程副本模式会按项目方向使用默认分辨率；当前 Unity 实例接管模式会尽量沿用当前 Game View 分辨率。
  # 自动截图会在聊天中让你选择“临时工程副本”或“接管当前 Unity 实例”，不需要在 YAML 中填写。

  屏幕方向: ""
  # 可选。选项参考：竖屏、横屏。
  # 留空时自动根据项目设置、已有截图或界面证据推断；无法推断时按竖屏处理。

固定审核要求:
  # 以下 5 项是生成材料前必须审核的重点。不满足时应提醒用户可能过不了审，并建议更新材料。
  代码不显示行号且源代码节选不少于3200行: true
  登录或启动入口界面必须包含健康游戏公告: true
  登录或启动入口界面账号密码注册开始游戏入口必须在说明书说明: true
  建议提供退出战斗和退出整个APP截图与说明来源: true
  截图中出现但未说明的按钮或入口建议补充说明或删除截图元素: true

截图说明:
  # 截图不需要在这里填写路径，直接放到资料包的“截图/”目录。
  # 推荐命名：
  # - 登录.png
  # - 主界面.png
  # - 角色养成.png
  # - 战斗_血量变化_1.png
  # - 战斗_血量变化_2.png
  # - 战斗_胜利结算.png
  # - 战斗_失败结算.png
  # - 退出.png
  命名建议: "请按功能命名截图，便于自动生成说明书第 7 章。"

